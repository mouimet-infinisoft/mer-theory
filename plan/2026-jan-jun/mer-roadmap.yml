    body: |
      WBS: 2.5

      Tasks (explicit):
      - [ ] Run `analysis/phase_02_synthesis.py` that loads slice outputs, computes combined predictive metrics (MAE, RMSE, combined p-values), and generates `docs/PHASE_2_VERDICT.md`.
      - [ ] Produce `outputs/phase_02_mer_vs_standard.csv` with side-by-side comparisons and effect sizes.

      Decision rule: GO to Phase 3 if ε predicts ≥2 independent phenomena with prediction error <30% and theoretical derivation produced a plausible α; else PIVOT/NO-GO with documented reasons.

