  - title: "3.0 PHASE 3: Validate Unification (Months 5-6)"
    body: |
      Central question: Can MER (φ/ψ + ε or ε alone) reproduce QM and GR predictions?

      Note: Phase 3 runs only if Phase 1 OR Phase 2 meets GO criteria. All slices below require reproducible numerical code and unit tests.
    labels: [phase, phase-3, wbs]
