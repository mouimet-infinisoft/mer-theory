  - title: "3.1 Slice 3.1: Quantum Harmonic Oscillator Reproduction"
    body: |
      WBS: 3.1

      Summary
      - Implement MER dynamics for 1D harmonic oscillator and extract energy spectrum; compare numerically to ℏω(n+1/2).

      Implementation details:
      - Use finite-difference discretization with grid N>=2048 (test convergence)
      - Provide parameter sweep over ε and report limit ε→0

      Output schema:
      - outputs/slice_09_energy_levels.csv: level_index, E_mer_J, E_qm_J, rel_error_pct

      Acceptance criteria: ground & first few excited states within 10% and correct spacing within 10%.

      Time estimate: 2 weeks
    labels: [slice, phase-3, quantum-mechanics, rigorous]
    milestone: "Month 5-6"

  - title: "3.2 Slice 3.2: Hydrogen Atom Spectrum Reproduction"
    body: |
      WBS: 3.2

      Summary
      - Extend MER to 3D radial problem with Coulomb potential and compare energy levels and degeneracies to QM.

      Implementation details:
      - Use spherical coordinate reduction to radial equation, grid N>=4096 for radial coordinate with appropriate mapping r∈[0,R_max]
      - Provide convergence tests and stability analysis

      Acceptance criteria: ground state energy within 10% and 1/n^2 scaling reproduced for first several n.

      Time estimate: 2 weeks
    labels: [slice, phase-3, atomic-physics, rigorous]
    milestone: "Month 5-6"

  - title: "3.3 Slice 3.3: Black Hole Event Horizon Reproduction"
    body: |
      WBS: 3.3

