      Deliverables:
      - outputs/slice_11_horizon_vs_mass.csv (mass_kg, r_mer_m, r_schwarzschild_m, ratio)
      - Document assumptions and approximations clearly in docs/slice_11_derivation.pdf

      Acceptance criteria: predicted radius within factor of 2 over mass range tested.

      Time estimate: 2 weeks
    labels: [slice, phase-3, general-relativity, rigorous]
    milestone: "Month 5-6"

